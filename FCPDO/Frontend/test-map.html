<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
            height: 600px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Mock barangay data
        const barangays = [
            {"id":1,"name":"Abut","zone":"North","population":3200,"area_sqkm":1.2,"poverty_level":"moderate","performance_status":"moderate","coordinates_lat":16.625,"coordinates_lng":120.315,"active_programs":1},
            {"id":2,"name":"Apaleng","zone":"North","population":4100,"area_sqkm":1.45,"poverty_level":"low","performance_status":"high","coordinates_lat":16.628,"coordinates_lng":120.318,"active_programs":3},
            {"id":3,"name":"Bacsil","zone":"North","population":2800,"area_sqkm":0.95,"poverty_level":"moderate","performance_status":"moderate","coordinates_lat":16.631,"coordinates_lng":120.321,"active_programs":2},
            {"id":4,"name":"Bangbangolan","zone":"North","population":3500,"area_sqkm":1.1,"poverty_level":"low","performance_status":"high","coordinates_lat":16.634,"coordinates_lng":120.324,"active_programs":4},
            {"id":5,"name":"Bangcusay","zone":"North","population":5200,"area_sqkm":1.8,"poverty_level":"low","performance_status":"high","coordinates_lat":16.637,"coordinates_lng":120.327,"active_programs":5},
            {"id":6,"name":"Barangay I","zone":"Central","population":6800,"area_sqkm":0.65,"poverty_level":"moderate","performance_status":"moderate","coordinates_lat":16.615,"coordinates_lng":120.316,"active_programs":2},
            {"id":7,"name":"Barangay II","zone":"Central","population":7200,"area_sqkm":0.7,"poverty_level":"moderate","performance_status":"moderate","coordinates_lat":16.616,"coordinates_lng":120.317,"active_programs":2},
            {"id":8,"name":"Barangay III","zone":"Central","population":6500,"area_sqkm":0.68,"poverty_level":"moderate","performance_status":"moderate","coordinates_lat":16.617,"coordinates_lng":120.318,"active_programs":1},
            {"id":9,"name":"Barangay IV","zone":"Central","population":7100,"area_sqkm":0.72,"poverty_level":"low","performance_status":"high","coordinates_lat":16.618,"coordinates_lng":120.319,"active_programs":4},
            {"id":10,"name":"Baraoas","zone":"South","population":3900,"area_sqkm":1.3,"poverty_level":"moderate","performance_status":"moderate","coordinates_lat":16.6,"coordinates_lng":120.31,"active_programs":2},
            {"id":11,"name":"Bato","zone":"South","population":4200,"area_sqkm":1.4,"poverty_level":"moderate","performance_status":"needs_attention","coordinates_lat":16.598,"coordinates_lng":120.308,"active_programs":0},
            {"id":12,"name":"Biday","zone":"South","population":3100,"area_sqkm":1.05,"poverty_level":"high","performance_status":"needs_attention","coordinates_lat":16.596,"coordinates_lng":120.306,"active_programs":0}
        ];

        // Create name -> data lookup
        const barangayLookup = {};
        barangays.forEach(b => {
            barangayLookup[b.name.toLowerCase()] = b;
        });

        // Status colors
        const STATUS_COLOR = {
            high: { fill: '#16a34a', border: '#15803d' },
            moderate: { fill: '#ca8a04', border: '#a16207' },
            needs_attention: { fill: '#dc2626', border: '#b91c1c' }
        };

        // Helper function to get style based on layer
        function getLayerStyle(feature, layerType) {
            let status = 'moderate';
            
            if (feature.properties.data) {
                const data = feature.properties.data;
                
                switch(layerType) {
                    case 'poverty':
                        if (data.poverty_level === 'low') {
                            status = 'high';
                        } else if (data.poverty_level === 'high') {
                            status = 'needs_attention';
                        } else {
                            status = 'moderate';
                        }
                        break;
                    case 'program':
                        if (data.active_programs > 3) {
                            status = 'high';
                        } else if (data.active_programs < 1) {
                            status = 'needs_attention';
                        } else {
                            status = 'moderate';
                        }
                        break;
                    default: // economic
                        status = feature.properties.status || 'moderate';
                }
            }

            const colors = STATUS_COLOR[status] || STATUS_COLOR.moderate;
            return {
                fillColor: colors.fill,
                weight: 2,
                opacity: 1,
                color: colors.border,
                fillOpacity: 0.7
            };
        }

        // Initialize map
        const map = L.map('map', {
            center: [16.60, 120.315],
            zoom: 13,
            zoomControl: true
        });

        // Add base map
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            maxZoom: 19
        }).addTo(map);

        // Layer selectors
        let barangayLayer;
        let currentLayerType = 'economic';

        // Load GeoJSON
        fetch('data/sf-barangays.geojson')
            .then(res => res.json())
            .then(geoData => {
                // Add status to each feature
                geoData.features.forEach(feature => {
                    const name = feature.properties.name.toLowerCase();
                    const barangayData = barangayLookup[name];
                    if (barangayData) {
                        feature.properties.status = barangayData.performance_status || 'moderate';
                        feature.properties.data = barangayData;
                    } else {
                        feature.properties.status = 'moderate';
                    }
                });

                // Add layer to map
                barangayLayer = L.geoJSON(geoData, {
                    style: feature => getLayerStyle(feature, currentLayerType),
                    onEachFeature: (feature, layer) => {
                        const name = feature.properties.name;
                        const data = feature.properties.data;

                        // Show barangay name as permanent label
                        layer.bindTooltip(
                            `<div style="font-size:10px;font-weight:bold;text-align:center;white-space:nowrap">${name}</div>`,
                            { permanent: true, direction: 'center', opacity: 0.9 }
                        );

                        // Popup with barangay info
                        let popupContent = `<div style="font-weight:700;font-size:14px;color:#1f2937">${name}</div>`;
                        if (data) {
                            if (data.zone) {
                                popupContent += `<div style="font-size:12px">Zone: ${data.zone}</div>`;
                            }
                            popupContent += `<div style="font-size:12px">Population: ${data.population ? data.population.toLocaleString() : 'N/A'}</div>`;
                            if (data.area_sqkm) {
                                popupContent += `<div style="font-size:12px">Area: ${parseFloat(data.area_sqkm).toFixed(2)} sq km</div>`;
                            }
                            if (data.performance_status) {
                                const statusColor = STATUS_COLOR[data.performance_status]?.border || '#374151';
                                popupContent += `<div style="margin-top:4px;font-weight:600;color:${statusColor}">Performance: ${data.performance_status.replace('_', ' ')}</div>`;
                            }
                            if (data.poverty_level) {
                                popupContent += `<div style="font-size:12px">Poverty Level: ${data.poverty_level}</div>`;
                            }
                            if (typeof data.active_programs !== 'undefined') {
                                popupContent += `<div style="font-size:12px">Active Programs: ${data.active_programs}</div>`;
                            }
                        }
                        layer.bindPopup(popupContent);

                        // Hover effect
                        layer.on('mouseover', e => {
                            const layer = e.target;
                            layer.setStyle({
                                weight: 3,
                                fillOpacity: 0.85
                            });
                            layer.bringToFront();
                        });
                        layer.on('mouseout', e => {
                            barangayLayer.resetStyle(e.target);
                        });
                    }
                }).addTo(map);

                // Fit to bounds
                if (barangayLayer.getBounds().isValid()) {
                    map.fitBounds(barangayLayer.getBounds(), { padding: [20, 20] });
                }
            })
            .catch(err => console.error('Error loading map data:', err));

        // Add layer selector
        const layerControls = L.control({ position: 'topright' });
        layerControls.onAdd = () => {
            const div = L.DomUtil.create('div', 'leaflet-bar');
            div.innerHTML = `
                <select id="layerSelect" style="padding: 8px; margin: 5px; border-radius: 4px; border: 1px solid #ccc;">
                    <option value="economic">Economic Performance</option>
                    <option value="program">Program Coverage</option>
                    <option value="poverty">Poverty Level</option>
                </select>
            `;

            // Prevent map interaction when using the control
            L.DomEvent.disableClickPropagation(div);
            L.DomEvent.disableScrollPropagation(div);

            // Add event listener to the select
            const select = div.querySelector('#layerSelect');
            select.addEventListener('change', e => {
                currentLayerType = e.target.value;
                if (barangayLayer) {
                    barangayLayer.eachLayer(layer => {
                        if (layer.feature) {
                            layer.setStyle(getLayerStyle(layer.feature, currentLayerType));
                        }
                    });
                }
            });

            return div;
        };
        layerControls.addTo(map);
    </script>
</body>
</html>
